name: Backup Data And Sync

on:
  workflow_dispatch:
  schedule:
    # 北京时间每天 02:50：先备份，再触发线上增量同步。
    - cron: "50 18 * * *"

permissions:
  contents: write

jobs:
  backup-and-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare-backend/package-lock.json

      - name: Install backend dependencies
        working-directory: cloudflare-backend
        run: npm ci

      - name: Create D1 backup package
        working-directory: cloudflare-backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run backup:remote

      - name: Publish public data package to GitHub Release
        working-directory: cloudflare-backend
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BACKUP_DIR="$(cat backups/latest-backup-path.txt)"
          BACKUP_NAME="$(basename "$BACKUP_DIR")"
          PUBLIC_ARCHIVE="zju-mentor-public-data-latest.tar.gz"
          tar -czf "$PUBLIC_ARCHIVE" -C "$BACKUP_DIR" manifest.json database-public.sql.gz json/public
          gh release delete "data-latest" --yes --cleanup-tag || true
          gh release create "data-latest" "$PUBLIC_ARCHIVE" \
            --title "ZJU Mentor latest public data" \
            --notes "请下载 zju-mentor-public-data-latest.tar.gz。下方 Source code 是 GitHub 自动生成的代码快照，不是全站数据包。数据包生成时间：${BACKUP_NAME}，生成于每日同步前；已排除站点反馈、同步日志、访问标识和原始投票标识。"

      - name: Trigger production sync
        env:
          ZJU_MENTOR_SYNC_URL: ${{ secrets.ZJU_MENTOR_SYNC_URL }}
          ZJU_MENTOR_ADMIN_TOKEN: ${{ secrets.ZJU_MENTOR_ADMIN_TOKEN }}
        run: |
          curl -fsS -X POST "${ZJU_MENTOR_SYNC_URL%/}/api/admin/sync/run-daily" \
            -H "X-Admin-Token: ${ZJU_MENTOR_ADMIN_TOKEN}"
